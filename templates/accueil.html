<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue sur notre API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #43cea2, #185a9d);
            color: #fff;
            flex-direction: column;
            text-align: center;
        }
        .container {
            background-color: #fff;
            color: #333;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 2.5rem;
            color: #185a9d;
            margin-bottom: 1.5rem;
        }
        p {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 2rem;
        }
        .question {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        button {
            font-weight: 500;
            color: #fff;
            background-color: #185a9d;
            padding: 0.6rem 1.2rem;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            cursor: pointer;
            border: none;
        }
        button:hover {
            background-color: #104773;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Message de bienvenue -->
        <h1>Bienvenue sur notre API</h1>
        <p>
            À base de Machine Learning pour le traitement et l'analyse des fichiers de sondage pour une prise de décision éclairée pour l'entreprise Expresso Sénégal.
        </p>

        <!-- Question pour choisir un modèle -->
        <div class="question">
            <label for="model-selection">Voulez-vous consulter lequel des modèles ?</label>
        </div>

        <!-- Boutons pour sélectionner les modèles -->
        <div class="btn-container">
            <button onclick="window.location.href='dashboard'">Modèle 1</button>
            <button onclick="window.location.href='index'">Modèle 2</button>
        </div>
    </div>

</body>
</html>
